            <div id="events-stack">
              <section aria-labelledby="homepage-upcoming-events-heading">
                <h3 id="homepage-upcoming-events-heading" class="events-sidebar-section__label">Upcoming</h3>
                {% for event in collections.eventsUpcoming %}
                  {% include "partials/event-card.html" %}
                {% else %}
                  <p class="events-sidebar-empty">No upcoming events.</p>
                {% endfor %}
              </section>
              <section aria-labelledby="homepage-past-events-heading">
                <h3 id="homepage-past-events-heading" class="events-sidebar-section__label">Past events</h3>
                {% for event in collections.eventsPast %}
                  {% include "partials/event-card.html" %}
                {% else %}
                  <p class="events-sidebar-empty">No past events.</p>
                {% endfor %}
              </section>
            </div>
