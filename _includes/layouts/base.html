<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="{{ description | default: 'The Disengineering Society is a hardware hacking collective. We run workshops teaching people how to build electronic musical instruments using salvaged electronic waste.' }}"
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="disengineering" />
    <meta property="og:title" content="{% if title %}{{ title }} — disengineering{% else %}disengineering{% endif %}" />
    <meta
      property="og:description"
      content="{{ description | default: 'The Disengineering Society is a hardware hacking collective. We run workshops teaching people how to build electronic musical instruments using salvaged electronic waste.' }}"
    />
    <meta property="og:image" content="https://disengineering.github.io/assets/footer/footer_logo.png" />
    <meta property="og:url" content="https://disengineering.github.io{{ page.url }}" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://disengineering.github.io/assets/footer/footer_logo.png" />
    <title>{% if title %}{{ title }} — disengineering{% else %}disengineering{% endif %}</title>
    <link
      rel="preload"
      href="/assets/fonts/happy-times/happy-times-ng_regular_master-webfont.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/assets/fonts/happy-times/happy-times-ng_italic_master-webfont.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/assets/fonts/oldschool-pc/Web437_Acer_VGA_8x8-2y.woff"
      as="font"
      type="font/woff"
      crossorigin
    />
    <link rel="icon" href="/assets/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body{% if colorScheme %} data-color-scheme="{{ colorScheme }}"{% endif %}>
    <header id="site-header">
        <span id="site-header-wires" class="site-header-graphic" style="--site-header-mask: url('/assets/header/wires_banner_NEW.png')" aria-hidden="true">
          <img eleventy:ignore class="site-header-graphic__sizing" src="/assets/header/wires_banner_NEW.png" alt="" aria-hidden="true" />
        </span>
        {% assign _nav_seg = page.url | split: "/" | slice: 1, 1 | first %}
        <a id="site-logo" href="/" aria-label="Disengineering home">
          <span class="site-header-graphic" style="--site-header-mask: url('/assets/header/DIS_LOGO.png')">
            <img eleventy:ignore class="site-header-graphic__sizing" src="/assets/header/DIS_LOGO.png" alt="" aria-hidden="true" />
          </span>
          <span class="site-header-graphic" style="--site-header-mask: url('/assets/header/DIS_LOGO_HOVER.png')">
            <img eleventy:ignore class="site-header-graphic__sizing" src="/assets/header/DIS_LOGO_HOVER.png" alt="" aria-hidden="true" />
          </span>
        </a>
        <nav aria-label="Primary">
          <a id="site-nav-zines" href="/zines/" aria-label="Zines"{% if _nav_seg == "zines" %} aria-current="page"{% endif %}>
            <span class="site-header-graphic" style="--site-header-mask: url('/assets/header/nav/zines/zines.png')">
              <img eleventy:ignore class="site-header-graphic__sizing" src="/assets/header/nav/zines/zines.png" alt="" aria-hidden="true" />
            </span>
            <span class="site-header-graphic" style="--site-header-mask: url('/assets/header/nav/zines/zines_hover.png')">
              <img eleventy:ignore class="site-header-graphic__sizing" src="/assets/header/nav/zines/zines_hover.png" alt="" aria-hidden="true" />
            </span>
          </a>
          <a id="site-nav-events" href="/events/" aria-label="Workshops"{% if _nav_seg == "events" %} aria-current="page"{% endif %}>
            <span class="site-header-graphic" style="--site-header-mask: url('/assets/header/nav/workshops/workshops.png')">
              <img eleventy:ignore class="site-header-graphic__sizing" src="/assets/header/nav/workshops/workshops.png" alt="" aria-hidden="true" />
            </span>
            <span class="site-header-graphic" style="--site-header-mask: url('/assets/header/nav/workshops/workshops_hover.png')">
              <img eleventy:ignore class="site-header-graphic__sizing" src="/assets/header/nav/workshops/workshops_hover.png" alt="" aria-hidden="true" />
            </span>
          </a>
          <a id="site-nav-links" href="/links/" aria-label="Links"{% if _nav_seg == "links" %} aria-current="page"{% endif %}>
            <span class="site-header-graphic" style="--site-header-mask: url('/assets/header/nav/links/links.png')">
              <img eleventy:ignore class="site-header-graphic__sizing" src="/assets/header/nav/links/links.png" alt="" aria-hidden="true" />
            </span>
            <span class="site-header-graphic" style="--site-header-mask: url('/assets/header/nav/links/links_hover.png')">
              <img eleventy:ignore class="site-header-graphic__sizing" src="/assets/header/nav/links/links_hover.png" alt="" aria-hidden="true" />
            </span>
          </a>
          <a id="site-nav-archive" href="/archive/" aria-label="Archive"{% if _nav_seg == "archive" %} aria-current="page"{% endif %}>
            <span class="site-header-graphic" style="--site-header-mask: url('/assets/header/nav/archive/archive.png')">
              <img eleventy:ignore class="site-header-graphic__sizing" src="/assets/header/nav/archive/archive.png" alt="" aria-hidden="true" />
            </span>
            <span class="site-header-graphic" style="--site-header-mask: url('/assets/header/nav/archive/archive_hover.png')">
              <img eleventy:ignore class="site-header-graphic__sizing" src="/assets/header/nav/archive/archive_hover.png" alt="" aria-hidden="true" />
            </span>
          </a>
          <a id="site-nav-about" href="/about/" aria-label="About"{% if _nav_seg == "about" %} aria-current="page"{% endif %}>
            <span class="site-header-graphic" style="--site-header-mask: url('/assets/header/nav/about/about.png')">
              <img eleventy:ignore class="site-header-graphic__sizing" src="/assets/header/nav/about/about.png" alt="" aria-hidden="true" />
            </span>
            <span class="site-header-graphic" style="--site-header-mask: url('/assets/header/nav/about/about_hover.png')">
              <img eleventy:ignore class="site-header-graphic__sizing" src="/assets/header/nav/about/about_hover.png" alt="" aria-hidden="true" />
            </span>
          </a>
        </nav>
        <span id="site-header-hands" class="site-header-graphic" style="--site-header-mask: url('/assets/header/hands_banner.png')" aria-hidden="true">
          <img eleventy:ignore class="site-header-graphic__sizing" src="/assets/header/hands_banner.png" alt="" aria-hidden="true" />
        </span>
    </header>
    <div id="body-layout">
      <div id="content">
        {% if page.url == '/' %}
        {{ content }}
        {% else %}
        <div class="content-measure">
          {{ content }}
        </div>
        {% endif %}
        <footer id="site-footer">
          <img
            eleventy:ignore
            src="/assets/footer/in_ground.png"
            alt="In ground we trust"
            loading="lazy"
          />
          <ul id="links">
            <li><a href="https://instagram.com/disengineering">INSTAGRAM</a></li>
            <li><a href="mailto:disengineeringsociety@gmail.com">EMAIL</a></li>
            <li>DISCORD COMING SOON</li>
          </ul>
          <div>
            <img
              eleventy:ignore
              src="/assets/footer/footer_logo.png"
              alt="Disengineering"
              loading="lazy"
            />
          </div>
          <span>EST. 2022</span>
          <img
            eleventy:ignore
            src="/assets/footer/in_ground.png"
            alt=""
            loading="lazy"
            aria-hidden="true"
          />
        </footer>
      </div>
    </div>
  </body>
</html>
