<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="{{ description | default: 'Disengineering — a hardware hacking collective focused on electronic musical instruments, workshops, zines, and sustainable design.' }}"
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="disengineering" />
    <meta property="og:title" content="{% if title %}{{ title }} — disengineering{% else %}disengineering{% endif %}" />
    <meta
      property="og:description"
      content="{{ description | default: 'disengineering — a hardware hacking collective focused on electronic musical instruments, workshops, zines, and sustainable design.' }}"
    />
    <meta property="og:image" content="https://disengineering.github.io/assets/footer/footer_logo.png" />
    <meta property="og:url" content="https://disengineering.github.io{{ page.url }}" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://disengineering.github.io/assets/footer/footer_logo.png" />
    <title>{% if title %}{{ title }} — disengineering{% else %}disengineering{% endif %}</title>
    {% if page.url == '/' %}<link rel="preconnect" href="https://unpkg.com" crossorigin />{% endif %}
    <link
      rel="preload"
      href="/assets/fonts/happy-times/happy-times-ng_regular_master-webfont.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/assets/fonts/happy-times/happy-times-ng_italic_master-webfont.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/assets/fonts/retro_computer_personal_use.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <link rel="icon" href="/assets/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body>
    <header id="site-header">
        <img
          eleventy:ignore
          id="site-header-wires"
          src="/assets/header/wires_banner.png"
          alt=""
        />
        {% assign _nav_seg = page.url | split: "/" | slice: 1, 1 | first %}
        <a id="site-logo" href="/" aria-label="Disengineering home">
          <img
            eleventy:ignore
            src="/assets/header/DIS_LOGO.png"
            alt="Disengineering"
          />
          <img
            eleventy:ignore
            src="/assets/header/DIS_LOGO_HOVER.png"
            alt=""
            aria-hidden="true"
          />
        </a>
        <nav aria-label="Primary">
          <a id="site-nav-zines" href="/zines/"{% if _nav_seg == "zines" %} aria-current="page"{% endif %}>
            <img eleventy:ignore src="/assets/header/nav/zines/zines.png" alt="Zines" />
            <img eleventy:ignore src="/assets/header/nav/zines/zines_hover.png" alt="" aria-hidden="true" />
          </a>
          <a id="site-nav-events" href="/events/"{% if _nav_seg == "events" %} aria-current="page"{% endif %}>
            <img eleventy:ignore src="/assets/header/nav/workshops/workshops.png" alt="Workshops" />
            <img eleventy:ignore src="/assets/header/nav/workshops/workshops_hover.png" alt="" aria-hidden="true" />
          </a>
          <a id="site-nav-links" href="/links/"{% if _nav_seg == "links" %} aria-current="page"{% endif %}>
            <img eleventy:ignore src="/assets/header/nav/links/links.png" alt="Links" />
            <img eleventy:ignore src="/assets/header/nav/links/links_hover.png" alt="" aria-hidden="true" />
          </a>
          <a id="site-nav-archive" href="/archive/"{% if _nav_seg == "archive" %} aria-current="page"{% endif %}>
            <img eleventy:ignore src="/assets/header/nav/archive/archive.png" alt="Archive" />
            <img eleventy:ignore src="/assets/header/nav/archive/archive_hover.png" alt="" aria-hidden="true" />
          </a>
          <a id="site-nav-about" href="/about/"{% if _nav_seg == "about" %} aria-current="page"{% endif %}>
            <img eleventy:ignore src="/assets/header/nav/about/about.png" alt="About" />
            <img eleventy:ignore src="/assets/header/nav/about/about_hover.png" alt="" aria-hidden="true" />
          </a>
        </nav>
        <img
          eleventy:ignore
          id="site-header-hands"
          src="/assets/header/hands_banner.png"
          alt=""
        />
    </header>
    <div id="body-layout">
      <div id="content">
        {% if page.url == '/' %}
        {{ content }}
        {% else %}
        <div class="content-measure">
          {{ content }}
        </div>
        {% endif %}
        <footer id="site-footer">
          <img
            eleventy:ignore
            class="footer-ground"
            src="/assets/footer/in_ground.png"
            alt="In ground we trust"
            loading="lazy"
          />
          <ul id="links">
            <li><a href="https://instagram.com/disengineering">INSTAGRAM</a></li>
            <li><a href="mailto:disengineeringsociety@gmail.com">EMAIL</a></li>
            <li>DISCORD COMING SOON</li>
          </ul>
          <div id="footer-brand">
            <div id="footer-brand-logo">
              <img
                eleventy:ignore
                src="/assets/footer/footer_logo.png"
                alt="Disengineering"
                loading="lazy"
              />
            </div>
          </div>
          <span id="footer-brand-est">EST. 2022</span>
          <img
            eleventy:ignore
            class="footer-ground"
            src="/assets/footer/in_ground.png"
            alt=""
            loading="lazy"
            aria-hidden="true"
          />
        </footer>
      </div>
    </div>
  </body>
</html>
